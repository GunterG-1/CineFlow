spring:
  application:
    name: CineFlow-Gateway
  main:
    web-application-type: reactive
  cloud:
    gateway:
      server:
        webflux:
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials
          routes:
        # Ruta para Usuarios (Puerto 8081)
            - id: usuarios-service
              uri: http://localhost:8081
              predicates:
                - Path=/usuarios/**
              filters:
                - StripPrefix=0

        # Ruta para Cartelera (Puerto 8082)
            - id: cartelera-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/cartelera/**
              filters:
                - StripPrefix=0

        # Ruta para Confitería (Puerto 8083)
            - id: confiteria-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/confiteria/**
              filters:
                - StripPrefix=0

        # Ruta para Entradas (Puerto 8084)
            - id: entradas-service
              uri: http://localhost:8084
              predicates:
                - Path=/api/entradas/**
              filters:
                - StripPrefix=0

          # Configuración global de CORS
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins: "*"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - PATCH
                  - OPTIONS
                allowedHeaders: "*"
                allowCredentials: false
                maxAge: 3600

server:
  port: 8080

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.web: INFO
